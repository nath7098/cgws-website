<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Spin &amp; Slide Shop — Sellerie western &amp; reining">
  <!--
    Image Open Graph PAR DÉFAUT — PROVISOIRE (US-106).
    Wordmark typographique sur cuir brûlé, palette design system v2. Sert de
    source à la rasterisation public/og-default.png (1200x630) référencée par
    DEFAULT_OG_IMAGE. À remplacer par l'image OG définitive (livrable design /
    Camille) ; regénérer ensuite le PNG.
  -->
  <rect width="1200" height="630" fill="#3D1A06"/>
  <rect x="24" y="24" width="1152" height="582" rx="14" fill="none" stroke="#7B3B1C" stroke-width="3"/>

  <!-- Motif traces de sliding stop, en accent -->
  <g stroke="#B8650A" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <line x1="96" y1="470" x2="205" y2="160"/>
    <line x1="150" y1="470" x2="259" y2="160"/>
  </g>

  <!-- Eyebrow -->
  <text x="315" y="205" font-family="'Georgia', serif" font-size="30" letter-spacing="10" fill="#C8AB82">SELLERIE WESTERN &amp; REINING</text>

  <!-- Wordmark -->
  <text x="313" y="330" font-family="'Arial', sans-serif" font-weight="700" font-size="120" letter-spacing="2" fill="#F0DDB8">Spin &amp; Slide</text>
  <text x="317" y="392" font-family="'Arial', sans-serif" font-weight="700" font-size="40" letter-spacing="14" fill="#B8650A">SHOP — BY CGWS</text>

  <!-- Baseline -->
  <text x="315" y="480" font-family="'Georgia', serif" font-size="30" fill="#C8AB82">Vente &amp; dépôt-vente de selles · Brèches (37)</text>
</svg>
