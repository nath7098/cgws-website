<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Spin &amp; Slide Shop">
  <!--
    Favicon PROVISOIRE (US-106) — traces de « sliding stop » (reining) sur cuir
    brûlé. Palette design system v2 : fond tack (#3D1A06), traces copper
    (#B8650A). À remplacer par le favicon définitif (livrable design / Camille)
    sans autre changement que ce fichier.
  -->
  <rect width="48" height="48" rx="10" fill="#3D1A06"/>
  <g stroke="#B8650A" stroke-width="4.5" stroke-linecap="round">
    <line x1="11" y1="37" x2="29" y2="11"/>
    <line x1="19" y1="37" x2="37" y2="11"/>
  </g>
</svg>
